<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ishan Kebab - Gostynin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
    }

    header {
      background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') center/cover;
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    header h1 {
      font-size: 3rem;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #000;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 40px 20px;
      text-align: center;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #222;
      padding: 20px;
      border-radius: 15px;
    }

    footer {
      background: #000;
      text-align: center;
      padding: 20px;
    }

    button {
      background: gold;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h1>Ishan Kebab 🍖<br>Gostynin</h1>
</header>

<nav>
  <a href="#menu">Menu</a>
  <a href="#about">O nas</a>
  <a href="#contact">Kontakt</a>
</nav>

<section id="about">
  <h2>O nas</h2>
  <p>Najlepszy kebab w Gostyninie 🔥 Świeże składniki, duże porcje i mega smak!</p>
</section>

<section id="menu">
  <h2>Menu</h2>
  <div class="menu">
    <div class="card">
      <h3>Kebab w bułce</h3>
      <p>Mięso, warzywa, sos</p>
      <button>Zamów</button>
    </div>
    <div class="card">
      <h3>Kebab w tortilli</h3>
      <p>Mięso, warzywa, sos</p>
      <button>Zamów</button>
    </div>
    <div class="card">
      <h3>Kebab box</h3>
      <p>Mięso + frytki</p>
      <button>Zamów</button>
    </div>
  </div>
</section>

<section id="contact">
  <h2>Kontakt</h2>
  <p>📍 Gostynin</p>
  <p>📞 123 456 789</p>
</section>

<footer>
  <p>© 2026 Ishan Kebab</p>
</footer>

</body>
</html>
